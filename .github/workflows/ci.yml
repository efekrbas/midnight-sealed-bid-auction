name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js v22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install NPM Dependencies
      run: npm install

    - name: Install Midnight Compact Compiler
      run: |
        curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "$HOME/.compact/bin" >> $GITHUB_PATH
      env:
        COMPACT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Download Compact Compiler
      run: compact update
      env:
        COMPACT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Verify Compact Version
      run: compact --version

    - name: Compile Contracts
      run: |
        ls -la contracts
        mkdir -p managed
        compact --skip-zk -v contracts/sealed_bid_auction.compact managed/sealed_bid_auction || (echo "Compilation failed with $?"; exit 1)
      env:
        COMPACT_PATH: ./node_modules
        RUST_BACKTRACE: 1
        ACTIONS_STEP_DEBUG: true

    - name: Run Test Suite
      run: npx jest tests/sealed_bid_auction.test.ts
      env:
        NODE_OPTIONS: --experimental-vm-modules
